<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky -->
  <rect width="32" height="32" rx="3" fill="#1a2a4a"/>
  <!-- Water -->
  <rect x="0" y="24" width="32" height="8" fill="#0d1e38"/>

  <!-- Bridge: international orange -->

  <!-- Left tower -->
  <rect x="8.5" y="4"  width="3" height="19" fill="#c94a1e"/>
  <rect x="6.5" y="6"  width="7" height="1.5" fill="#c94a1e"/>
  <rect x="6.5" y="13" width="7" height="1.5" fill="#c94a1e"/>

  <!-- Right tower -->
  <rect x="20.5" y="4"  width="3" height="19" fill="#c94a1e"/>
  <rect x="18.5" y="6"  width="7" height="1.5" fill="#c94a1e"/>
  <rect x="18.5" y="13" width="7" height="1.5" fill="#c94a1e"/>

  <!-- Main suspension cable -->
  <path d="M 0,23 Q 5,3 10,4 Q 16,15 22,4 Q 27,3 32,23"
        stroke="#c94a1e" stroke-width="1.5" fill="none"/>

  <!-- Suspender cables -->
  <line x1="3"  y1="14" x2="3"  y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>
  <line x1="5.5" y1="8.5" x2="5.5" y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>
  <line x1="14" y1="14" x2="14" y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>
  <line x1="18" y1="14" x2="18" y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>
  <line x1="26.5" y1="8.5" x2="26.5" y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>
  <line x1="29" y1="14" x2="29" y2="22.5" stroke="#c94a1e" stroke-width="0.8"/>

  <!-- Road deck -->
  <rect x="0" y="22.5" width="32" height="2" fill="#c94a1e"/>
</svg>
