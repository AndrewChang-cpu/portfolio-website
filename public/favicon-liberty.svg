<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Night sky -->
  <rect width="32" height="32" rx="3" fill="#0b1a2d"/>
  <!-- Water -->
  <rect x="0" y="27" width="32" height="5" fill="#071320"/>

  <!-- Statue: verdigris green -->
  <!-- Torch flame -->
  <polygon points="20.5,1.5 22.5,4.5 24.5,1.5 22.5,0.5" fill="#ffd700"/>
  <!-- Torch handle -->
  <rect x="21.5" y="4" width="2" height="4" fill="#5fa87a"/>
  <!-- Raised arm -->
  <polygon points="15.5,12 17,11.5 22.5,5.5 21,4.5" fill="#5fa87a"/>

  <!-- Crown base band -->
  <rect x="8" y="9" width="8.5" height="2" fill="#5fa87a"/>
  <!-- Crown spikes -->
  <polygon points="8.5,9   9.5,6.5  10.5,9"  fill="#5fa87a"/>
  <polygon points="11.5,9  12.5,6   13.5,9"  fill="#5fa87a"/>
  <polygon points="14.5,9  15.5,6.5 16.5,9"  fill="#5fa87a"/>

  <!-- Head -->
  <ellipse cx="12.5" cy="12" rx="2.5" ry="2" fill="#5fa87a"/>

  <!-- Body / robes -->
  <polygon points="8.5,14 17,14 19,25 6,25" fill="#5fa87a"/>

  <!-- Pedestal upper -->
  <rect x="7" y="25" width="13.5" height="2" fill="#4a8562"/>
  <!-- Pedestal lower -->
  <rect x="5.5" y="27" width="16.5" height="2" fill="#3a6a4e"/>
</svg>
